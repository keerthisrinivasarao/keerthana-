<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup & Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    width:350px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-box{
    margin-bottom:15px;
}

.input-box label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4facfe;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#00c6fb;
}

.link{
    text-align:center;
    margin-top:15px;
    color:blue;
    cursor:pointer;
}

#loginPage,
#welcomePage{
    display:none;
}

.user-details{
    line-height:35px;
    font-size:18px;
}

</style>
</head>

<body>

<!-- Signup Page -->

<div class="container" id="signupPage">

    <h2>Signup</h2>

    <div class="input-box">
        <label>Name</label>
        <input type="text" id="signupName">
    </div>

    <div class="input-box">
        <label>Mobile Number</label>
        <input type="text" id="signupMobile">
    </div>

    <div class="input-box">
        <label>Email</label>
        <input type="email" id="signupEmail">
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="password" id="signupPassword">
    </div>

    <button onclick="signup()">Signup</button>

    <div class="link" onclick="showLogin()">
        Already have an account? Login
    </div>

</div>

<!-- Login Page -->

<div class="container" id="loginPage">

    <h2>Login</h2>

    <div class="input-box">
        <label>Name</label>
        <input type="text" id="loginName">
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="password" id="loginPassword">
    </div>

    <button onclick="login()">Login</button>

</div>

<!-- Welcome Page -->

<div class="container" id="welcomePage">

    <h2>User Details</h2>

    <div class="user-details">

        <p><b>Name:</b> <span id="showName"></span></p>

        <p><b>Mobile:</b> <span id="showMobile"></span></p>

        <p><b>Email:</b> <span id="showEmail"></span></p>

        <p><b>Password:</b> <span id="showPassword"></span></p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// Correct URL
const SUPABASE_URL =
"https://paxhlgosqmjrbpualroy.supabase.co";

// Paste FULL anon public key here
const SUPABASE_ANON_KEY =
"sb_publishable_6JDa2H1RxowQaJhgI00YNQ_yCSiXPUK";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

function showLogin(){

    document.getElementById("signupPage").style.display = "none";

    document.getElementById("loginPage").style.display = "block";
}

async function signup(){

    let name =
    document.getElementById("signupName").value;

    let mobile =
    document.getElementById("signupMobile").value;

    let email =
    document.getElementById("signupEmail").value;

    let password =
    document.getElementById("signupPassword").value;

    if(name==="" || mobile==="" || email==="" || password===""){
        alert("Please fill all fields");
        return;
    }

    const { error } = await supabaseClient
    .from("users")
    .insert([
        {
            name:name,
            mobile:mobile,
            email:email,
            password:password
        }
    ]);

    if(error){

        alert(error.message);

    }else{

        alert("Signup Successful");

        document.getElementById("signupPage").style.display = "none";

        document.getElementById("loginPage").style.display = "block";
    }
}

async function login(){

    let loginName =
    document.getElementById("loginName").value;

    let loginPassword =
    document.getElementById("loginPassword").value;

    const { data, error } = await supabaseClient
    .from("users")
    .select("*")
    .eq("name", loginName)
    .eq("password", loginPassword);

    if(error){
        alert(error.message);
        return;
    }

    if(data.length > 0){

        document.getElementById("loginPage").style.display = "none";

        document.getElementById("welcomePage").style.display = "block";

        document.getElementById("showName").innerHTML =
        data[0].name;

        document.getElementById("showMobile").innerHTML =
        data[0].mobile;

        document.getElementById("showEmail").innerHTML =
        data[0].email;

        document.getElementById("showPassword").innerHTML =
        data[0].password;

    }else{

        alert("Invalid Login Details");
    }
}

</script>

</body>
</html>
