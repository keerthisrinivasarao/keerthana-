<!DOCTYPE html>
<html>
<head>
  <title>Inventory Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
 /* GLOBAL */
body {
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  padding: 30px;
  color: #1e293b;
}

/* FORM */
form {
  background: #ffffff;
  padding: 30px;
  border-radius: 18px;
  width: 520px;
  margin: auto;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 600;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  background: #f9fafb;
  font-size: 14px;
  transition: 0.25s;
}

textarea {
  min-height: 80px;
}

input:focus, select:focus, textarea:focus {
  border-color: #6366f1;
  background: #fff;
  outline: none;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}

/* ROW */
.row {
  display: flex;
  gap: 10px;
}

/* ===== INGREDIENTS SECTION ===== */
#ingredients-container {
  margin-top: 10px;
}

.ing-row-input {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  align-items: center;
  animation: fadeIn 0.2s ease;
}

.ing-row-input input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  background: #f9fafb;
}

/* DELETE BUTTON */
.remove-btn {
  width: 36px;
  height: 36px;
  background: #ef4444;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.remove-btn:hover {
  background: #dc2626;
  transform: scale(1.05);
}

/* ADD BUTTON */
#addRowBtn {
  margin-top: 8px;
  background: #10b981;
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 14px;
  border: none;
  color: white;
  cursor: pointer;
  display: inline-block;
}

#addRowBtn:hover {
  background: #059669;
}

/* SUBMIT BUTTON */
button[type="submit"] {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg,#6366f1,#4f46e5);
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  margin-top: 15px;
}

button[type="submit"]:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(79,70,229,0.3);
}

/* PRODUCT AREA */
#products {
  margin-top: 50px;
}

/* SECTION */
.section {
  margin-bottom: 35px;
}

.section h3 {
  margin-bottom: 12px;
  font-weight: 600;
}

/* SCROLL */
.cards {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.cards::-webkit-scrollbar {
  height: 6px;
}

.cards::-webkit-scrollbar-thumb {
  background: #c7d2fe;
  border-radius: 10px;
}

/* CARD */
.card {
  min-width: 260px;
  background: white;
  padding: 14px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.15);
}

/* IMAGES */
.images {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}

.images img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  border-radius: 8px;
}

/* TEXT */
h4 {
  margin: 6px 0;
  font-size: 15px;
}

/* PRICE */
.price {
  font-weight: 600;
  color: #16a34a;
}

.old {
  text-decoration: line-through;
  color: #9ca3af;
  margin-left: 5px;
}

/* SMALL TEXT */
.small {
  font-size: 12px;
  color: #6b7280;
  margin-top: 4px;
}

/* INGREDIENT TABLE DISPLAY */
.ing-table {
  margin-top: 8px;
  border-top: 1px solid #e5e7eb;
}

.ing-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 4px 0;
  border-bottom: 1px dashed #e5e7eb;
}

.ing-row span {
  width: 48%;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* RESPONSIVE */
@media (max-width: 600px) {
  form {
    width: 100%;
  }

  .row {
    flex-direction: column;
  }

  .card {
    min-width: 220px;
  }
}
/* FILE UPLOAD UI */
.file-group {
  margin-bottom: 10px;
}

.file-group label {
  font-size: 13px;
  color: #475569;
  margin-bottom: 4px;
  display: block;
}

.file-box {
  position: relative;
  border: 2px dashed #c7d2fe;
  border-radius: 12px;
  padding: 12px;
  background: #f8fafc;
  cursor: pointer;
  transition: 0.3s;
}

.file-box:hover {
  background: #eef2ff;
  border-color: #6366f1;
}

.file-text {
  font-size: 14px;
  color: #64748b;
}

/* hide actual input */
.file-box input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.small strong {
  color: #111827;
}
.benefits-list {
  margin-top: 6px;
  padding-left: 18px;
  font-size: 12px;
  color: #374151;
}
#category-box {
  display: grid;
  grid-template-columns: 1fr 1fr; /* 2 columns */
  gap: 10px;
  margin-bottom: 10px;
}

.cat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f1f5f9;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
}

.cat-item input {
  width: auto;   /* FIX MAIN ISSUE */
  margin: 0;
}
.benefits-list li {
  margin-bottom: 3px;
}
.info-list {
  margin-top: 6px;
  padding-left: 18px;
  font-size: 12px;
  color: #475569;
}

.info-list li {
  margin-bottom: 3px;
}
#category-box {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

#category-box label {
  display: flex;
  align-items: center;
  justify-content: flex-start; /* IMPORTANT */
  gap: 10px;
  cursor: pointer;
}

#category-box input {
  width: auto;   /* IMPORTANT FIX */
  margin: 0;
}
</style>
</head>

<body>

<h2>Inventory Dashboard</h2>

<form id="form">

<div id="category-box">
  <label class="cat-item"><input type="checkbox" value="All"> <span>All</span></label>
  <label class="cat-item"><input type="checkbox" value="Fresh"> <span>Fresh(fruits and veg)</span></label>
  <label class="cat-item"><input type="checkbox" value="50% Off"> <span>50% Off(summer)</span></label>
  <label class="cat-item"><input type="checkbox" value="Skincare"> <span>Skincare</span></label>
  <label class="cat-item"><input type="checkbox" value="Cool Drinks"> <span>Cool Drinks(cool)</span></label>
  <label class="cat-item"><input type="checkbox" value="Home"> <span>Home</span></label>
  <label class="cat-item"><input type="checkbox" value="Chocolates"> <span>Chocolates</span></label>
  <label class="cat-item"><input type="checkbox" value="Groceries"> <span>Groceries</span></label>
  <label class="cat-item"><input type="checkbox" value="Others"> <span>Others</span></label>
</div>

<div class="file-group">
  <label>Image 1</label>
  <div class="file-box">
    <span class="file-text" id="text1">Choose file...</span>
    <input type="file" id="img1" accept="image/webp">
  </div>
</div>

<div class="file-group">
  <label>Image 2</label>
  <div class="file-box">
    <span class="file-text" id="text2">Choose file...</span>
    <input type="file" id="img2" accept="image/webp">
  </div>
</div>

<div class="file-group">
  <label>Image 3</label>
  <div class="file-box">
    <span class="file-text" id="text3">Choose file...</span>
    <input type="file" id="img3" accept="image/webp">
  </div>
</div>
<input type="text" id="name" placeholder="Product Name" required>
<input type="text" id="brand" placeholder="Brand Name">
<input type="number" id="original" placeholder="Original Price">
<input type="number" id="discount" placeholder="Discount Price">

<div class="row">
  <input type="number" id="qty" placeholder="Quantity">
  <select id="unit">
    <option>liters</option>
    <option>pieces</option>
    <option>kg</option>
    <option>ml</option>
    <option>grams</option>
    <option>Packet</option>
  </select>
</div>

<textarea id="short" placeholder="Short Description"></textarea>

<!-- NEW FIELDS -->
<textarea id="long" placeholder="Long Description"></textarea>

<h4>Ingredients</h4>

<div id="ingredients-container">
  <div class="ing-row-input">
    <input class="ing" placeholder="Ingredient">
    <input class="ing" placeholder="Value">
    <button type="button" class="remove-btn">−</button>
  </div>
</div>

<button type="button" id="addRowBtn">+ Add Row</button>

<textarea id="use" placeholder="How to Use"></textarea>
<textarea id="benefits" placeholder="Benefits"></textarea>

<input type="number" step="0.1" id="rating" placeholder="Rating">
<textarea id="additional" placeholder="Additional Information"></textarea>
<button type="submit">Submit</button>

</form>

<div id="products"></div>

<script>
const SUPABASE_URL = "https://izoipzriynkcjtwuzrfu.supabase.co";
const SUPABASE_KEY = "sb_publishable_7ZRL1Y4JAppLTJonepuTIw_UQyGjVVw";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const tables = {
  "Fresh": "fresh_products",
  "50% Off": "offer_products",

  "Cool Skincare": "cool_skincare_products", // FIXED
  "Skincare": "skincare_products",           // NEW
  "Cool Drinks": "cool_drinks_products",     // NEW

  "Home": "home_products",
  "Chocolates": "chocolate_products",
  "Groceries": "grocery_products",
  "Others": "other_products",
  "All": "all_products"
};

// LOAD DATA
async function loadFromDB() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  for (let category in tables) {
    const { data } = await client.from(tables[category]).select("*");
    if (!data || data.length === 0) continue;

    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h3>${category}</h3><div class="cards"></div>`;
    const cards = section.querySelector(".cards");

    data.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

    let ingTable = "";

// convert string → array
if (item.ingredients) {
  try {
    const ingArr = JSON.parse(item.ingredients);

    for (let i = 0; i < ingArr.length; i += 2) {
      const col1 = ingArr[i] || "";
      const col2 = ingArr[i + 1] || "";

      ingTable += `
        <div class="ing-row">
          <span>${col1}</span>
          <span>${col2}</span>
        </div>
      `;
    }
  } catch (e) {
    console.error("Ingredients parse error");
  }
}

let benefitsHTML = "";

if (item.benefits) {
  const points = item.benefits.split("\n");

  benefitsHTML = points.map(p => `<li>${p}</li>`).join("");
}
let infoHTML = "";

if (item.additional_info) {
  const lines = item.additional_info.split("\n");

  infoHTML = lines
    .filter(l => l.trim() !== "")
    .map(l => `<li>${l}</li>`)
    .join("");
}

card.innerHTML = `
  <div class="images">
    <img src="${item.image1}">
    <img src="${item.image2}">
    <img src="${item.image3}">
  </div>

  <h4>${item.name}</h4>
  <div class="small"><strong>${item.brand || ""}</strong></div>

  <div class="price">
    ₹${item.discount_price}
    <span class="old">₹${item.original_price}</span>
  </div>

  <p>${item.short_desc || ""}</p>

  <div class="small">
    Qty: ${item.quantity || 0} ${item.unit || ""}
  </div>

  <div class="small">${item.long_desc || ""}</div>

  <div class="ing-table">
    ${ingTable}
  </div>

  <div class="small">Usage: ${item.how_to_use || ""}</div>

  <!-- ✅ BENEFITS AS LIST -->
  <ul class="benefits-list">
    ${benefitsHTML}
  </ul>

  <ul class="info-list">
  ${infoHTML}
</ul>
  ⭐ ${item.rating || 0}
`;
      cards.appendChild(card);
    });

    container.appendChild(section);
  }
}

// UPLOAD
async function upload(file) {
  const name = Date.now() + file.name;
  await client.storage.from("products").upload(name, file);
  return client.storage.from("products").getPublicUrl(name).data.publicUrl;
}
// ADD ROW
document.getElementById("addRowBtn").addEventListener("click", () => {
  const container = document.getElementById("ingredients-container");

  const row = document.createElement("div");
  row.className = "ing-row-input";

  row.innerHTML = `
    <input class="ing" placeholder="Ingredient">
    <input class="ing" placeholder="Value">
    <button type="button" class="remove-btn">−</button>
  `;

  container.appendChild(row);
});

// DELETE ROW (EVENT DELEGATION)
document.getElementById("ingredients-container").addEventListener("click", (e) => {
  if (e.target.classList.contains("remove-btn")) {
    const rows = document.querySelectorAll(".ing-row-input");

    // prevent deleting last row
    if (rows.length > 1) {
      e.target.parentElement.remove();
    } else {
      alert("At least one row required");
    }
  }
});
// SUBMIT
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  
  const url1 = await upload(img1.files[0]);
  const url2 = await upload(img2.files[0]);
  const url3 = await upload(img3.files[0]);

  // INGREDIENTS
  const ing = [...document.querySelectorAll(".ing")].map(i => i.value);
  const ingStr = JSON.stringify(ing);

  // GET SELECTED CHECKBOXES
const selectedCategories = [
  ...document.querySelectorAll('#category-box input:checked')
].map(cb => cb.value);

// CHECK IF EMPTY
if (selectedCategories.length === 0) {
  alert("Select at least one category");
  return;
}

// INSERT INTO MULTIPLE TABLES
for (let category of selectedCategories) {
  const tableName = tables[category];

  await client.from(tableName).insert([{
    name: document.getElementById("name").value,
    brand: document.getElementById("brand").value,

    original_price: document.getElementById("original").value,
    discount_price: document.getElementById("discount").value,
    quantity: document.getElementById("qty").value,
    unit: document.getElementById("unit").value,

    short_desc: document.getElementById("short").value,
    long_desc: document.getElementById("long").value,

    ingredients: ingStr,
    how_to_use: document.getElementById("use").value,
    benefits: document.getElementById("benefits").value,
    additional_info: document.getElementById("additional").value,

    rating: document.getElementById("rating").value,

    image1: url1,
    image2: url2,
    image3: url3
  }]);
}

  alert("Saved ✅");
  loadFromDB();
  form.reset();
});

loadFromDB();
function handleFile(inputId, textId) {
  const input = document.getElementById(inputId);
  const text = document.getElementById(textId);

  input.addEventListener("change", () => {
    if (input.files.length > 0) {
      text.textContent = input.files[0].name;
    } else {
      text.textContent = "Choose file...";
    }
  });
}

// apply for all 3
handleFile("img1", "text1");
handleFile("img2", "text2");
handleFile("img3", "text3");
</script>

</body>
</html>
