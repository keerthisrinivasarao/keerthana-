<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Exam Signup & Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:350px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-box{
    margin-bottom:15px;
}

.input-box label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4facfe;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#00c6fb;
}

.link{
    text-align:center;
    margin-top:15px;
    color:blue;
    cursor:pointer;
}

#loginPage,#dashboard{
    display:none;
}

.student-details{
    text-align:center;
    line-height:35px;
}
</style>
</head>

<body>

<!-- Signup Page -->
<div class="container" id="signupPage">

    <h2>Exam Signup</h2>

    <div class="input-box">
        <label>Student Name</label>
        <input type="text" id="signupName">
    </div>

    <div class="input-box">
        <label>Branch</label>
        <input type="text" id="signupBranch">
    </div>

    <div class="input-box">
        <label>Hall Ticket Number</label>
        <input type="text" id="signupHallticket">
    </div>

    <div class="input-box">
        <label>Email</label>
        <input type="email" id="signupEmail">
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="password" id="signupPassword">
    </div>

    <button onclick="signup()">Signup</button>

    <div class="link" onclick="showLogin()">
        Already Signup? Login
    </div>

</div>

<!-- Login Page -->
<div class="container" id="loginPage">

    <h2>Student Login</h2>

    <div class="input-box">
        <label>Student Name</label>
        <input type="text" id="loginName">
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="password" id="loginPassword">
    </div>

    <button onclick="login()">Login</button>

</div>

<!-- Dashboard -->
<div class="container" id="dashboard">

    <h2>Student Details</h2>

    <div class="student-details">
        <p><b>Name:</b> <span id="dName"></span></p>
        <p><b>Branch:</b> <span id="dBranch"></span></p>
        <p><b>Hall Ticket:</b> <span id="dHallticket"></span></p>
        <p><b>Email:</b> <span id="dEmail"></span></p>
    </div>

</div>

<script>

let studentData = {};

function signup(){

    studentData.name = document.getElementById("signupName").value;
    studentData.branch = document.getElementById("signupBranch").value;
    studentData.hallticket = document.getElementById("signupHallticket").value;
    studentData.email = document.getElementById("signupEmail").value;
    studentData.password = document.getElementById("signupPassword").value;

    if(
        studentData.name === "" ||
        studentData.branch === "" ||
        studentData.hallticket === "" ||
        studentData.email === "" ||
        studentData.password === ""
    ){
        alert("Please fill all fields");
        return;
    }

    alert("Signup Successful");

    document.getElementById("signupPage").style.display = "none";
    document.getElementById("loginPage").style.display = "block";
}

function showLogin(){

    document.getElementById("signupPage").style.display = "none";
    document.getElementById("loginPage").style.display = "block";
}

function login(){

    let loginName = document.getElementById("loginName").value;
    let loginPassword = document.getElementById("loginPassword").value;

    if(
        loginName === studentData.name &&
        loginPassword === studentData.password
    ){

        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        document.getElementById("dName").innerHTML = studentData.name;
        document.getElementById("dBranch").innerHTML = studentData.branch;
        document.getElementById("dHallticket").innerHTML = studentData.hallticket;
        document.getElementById("dEmail").innerHTML = studentData.email;

    }
    else{
        alert("Invalid Login Details");
    }
}

</script>

</body>
</html>
