<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

.link{
    text-align:center;
    margin-top:15px;
}

.link span{
    color:#2563eb;
    cursor:pointer;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<!-- SIGNUP -->

<div id="signupPage">

<h2>Create Account</h2>

<input type="text"
id="signupName"
placeholder="Enter Name">

<input type="text"
id="signupMobile"
placeholder="Enter Mobile Number">

<input type="password"
id="signupPassword"
placeholder="Enter Password">

<button onclick="signup()">
Sign Up
</button>

<div class="link">
Already have account?
<span onclick="showLogin()">
Login
</span>
</div>

</div>

<!-- LOGIN -->

<div id="loginPage" style="display:none;">

<h2>Login</h2>

<input type="text"
id="loginMobile"
placeholder="Enter Mobile Number">

<input type="password"
id="loginPassword"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<div class="link">
Create account?
<span onclick="showSignup()">
Signup
</span>
</div>

</div>

<div id="message"></div>

</div>

<script>

/////////////////////////////////////////////////////
// SUPABASE
/////////////////////////////////////////////////////

const SUPABASE_URL =
"https://jigjtjtdnquxxunplqbl.supabase.co";

const SUPABASE_KEY =
"sb_publishable_gD-xjaAktGM3yzC_YyAnCQ_5uZOcBIV";

const client =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

/////////////////////////////////////////////////////
// SHOW LOGIN
/////////////////////////////////////////////////////

function showLogin(){

    document.getElementById("signupPage")
    .style.display="none";

    document.getElementById("loginPage")
    .style.display="block";

    document.getElementById("message")
    .innerHTML="";
}

/////////////////////////////////////////////////////
// SHOW SIGNUP
/////////////////////////////////////////////////////

function showSignup(){

    document.getElementById("signupPage")
    .style.display="block";

    document.getElementById("loginPage")
    .style.display="none";

    document.getElementById("message")
    .innerHTML="";
}

/////////////////////////////////////////////////////
// SIGNUP
/////////////////////////////////////////////////////

async function signup(){

    let name =
    document.getElementById("signupName").value;

    let mobile =
    document.getElementById("signupMobile").value;

    let password =
    document.getElementById("signupPassword").value;

    if(name==="" ||
       mobile==="" ||
       password===""){

        document.getElementById("message")
        .innerHTML="Fill all fields";

        return;
    }

    //////////////////////////////////////////////////
    // CHECK USER
    //////////////////////////////////////////////////

    const {
        data:checkUser,
        error:checkError
    } = await client
    .from("users")
    .select("*")
    .eq("mobile",mobile);

    if(checkError){

        console.log(checkError);

        document.getElementById("message")
        .innerHTML="Database Error";

        return;
    }

    if(checkUser.length > 0){

        document.getElementById("message")
        .innerHTML="User already exists";

        return;
    }

    //////////////////////////////////////////////////
    // INSERT USER
    //////////////////////////////////////////////////

    const {
        error
    } = await client
    .from("users")
    .insert([
        {
            name:name,
            mobile:mobile,
            password:password
        }
    ]);

    if(error){

        console.log(error);

        document.getElementById("message")
        .innerHTML="Signup Failed";
    }
    else{

        document.getElementById("message")
        .innerHTML="Signup Successful";

        document.getElementById("signupName").value="";
        document.getElementById("signupMobile").value="";
        document.getElementById("signupPassword").value="";
    }
}

/////////////////////////////////////////////////////
// LOGIN
/////////////////////////////////////////////////////

async function login(){

    let mobile =
    document.getElementById("loginMobile").value;

    let password =
    document.getElementById("loginPassword").value;

    const {
        data,
        error
    } = await client
    .from("users")
    .select("*")
    .eq("mobile",mobile)
    .eq("password",password);

    if(error){

        console.log(error);

        document.getElementById("message")
        .innerHTML="Login Error";

        return;
    }

    if(data.length > 0){

        document.getElementById("message")
        .innerHTML="Login Successful";
    }
    else{

        document.getElementById("message")
        .innerHTML="Invalid Mobile or Password";
    }
}

</script>

</body>
</html>
